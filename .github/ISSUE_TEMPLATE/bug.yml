name: Bug report
description: Report a reproducible, non-sensitive defect.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, private code, personal data, or production evidence. Security vulnerabilities belong in private vulnerability reporting.
  - type: input
    id: version
    attributes:
      label: Version or revision
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Profile detection
        - Ledger validation
        - Review instructions
        - Source registry
        - Release tooling
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Actual behavior
      description: Use synthetic or redacted examples only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Safe reproduction steps
      description: Do not provide exploit-oriented steps against external systems.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed secrets, personal data, production evidence, and private repository content.
          required: true
