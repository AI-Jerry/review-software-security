name: Feature proposal
description: Propose a bounded improvement or security profile.
title: "[Proposal]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or review failure does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Explain routing evidence, outputs, and safety boundaries.
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Authoritative sources
      description: Include primary URLs, versions or access dates, and maturity.
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Synthetic evaluation plan
      description: Include positive and negative fixtures and expected results.
    validations:
      required: true
